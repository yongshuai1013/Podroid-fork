# Podroid vsock-agent initial forward table.
# Format:
#   <vport>  tcp  <host>  <gport>     splice vsock:vport ↔ tcp host:gport
#   <vport>  ctl                      line-oriented control channel
#
# vport convention: vport == hostPort on the Android side (1:1 mapping). The
# Android EngineHolder also pushes ADD/REMOVE over the ctl channel at runtime;
# agent's handle_add is idempotent on vport so collisions with these initial
# entries are safe.
#
# Minimal entries only — SSH (9922→22 by default) and user-added rules arrive
# via the ctl channel at runtime, so they don't need to live in the seed file.

# Control channel (matches VsockControlChannel.CTL_PORT on Android).
9100  ctl

# X11 viewer — always-on auto-injects in PodroidService.launchPodroid().
5900  tcp  127.0.0.1  5900
4713  tcp  127.0.0.1  4713
